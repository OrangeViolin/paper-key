<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>纸上键 · 给键盘一百种灵魂</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="paper">
  <header>
    <div class="logo">01fish</div>
    <h1>纸上键</h1>
    <p class="tagline">给你的键盘一百种灵魂 · 打字即禅</p>
  </header>

  <section class="sound-picker">
    <h2>挑一个声音</h2>
    <div id="soundGrid" class="grid"></div>
  </section>

  <section class="playground">
    <h2>在这里敲字试试</h2>
    <textarea id="typeArea" placeholder="按任意键开始⋯⋯ 连打 10 键有彩蛋" autofocus></textarea>
    <div class="stats">
      <span>当前音色：<b id="currentSound">HHKB 静电容</b></span>
      <span>今日字数：<b id="charCount">0</b></span>
      <span>WPM：<b id="wpm">0</b></span>
      <span>连击：<b id="combo">0</b></span>
    </div>
  </section>

  <section class="modes">
    <label class="switch">
      <input type="checkbox" id="zenMode"> 禅意模式（节气音色）
    </label>
    <label class="switch">
      <input type="checkbox" id="focusMode"> 专注模式（25 分钟）
    </label>
    <span id="timer" class="timer hidden">25:00</span>
  </section>

  <!-- 赞助区 -->
  <section class="support" id="support">
    <div class="support-head">
      <h2>⌇ 请鱼头头喝杯茶</h2>
      <p class="support-intro">
        纸上键完全免费。<br>
        如果它让你敲字时多了一点点开心，<br>
        可以请我喝杯茶 ——
      </p>
    </div>

    <div class="support-cards">
      <div class="support-card">
        <div class="support-emoji">🍵</div>
        <div class="support-amount">¥1</div>
        <div class="support-tag">一杯清茶</div>
      </div>
      <div class="support-card hot">
        <div class="support-emoji">☕</div>
        <div class="support-amount">¥6</div>
        <div class="support-tag">一杯咖啡</div>
      </div>
      <div class="support-card">
        <div class="support-emoji">🍜</div>
        <div class="support-amount">¥18</div>
        <div class="support-tag">一碗小面</div>
      </div>
      <div class="support-card">
        <div class="support-emoji">🐟</div>
        <div class="support-amount">随意</div>
        <div class="support-tag">自由心意</div>
      </div>
    </div>

    <div class="support-methods">
      <button class="support-btn primary" id="btnWechat">
        <span class="btn-icon">💚</span>微信支付
      </button>
      <a class="support-btn" href="https://github.com/orangeviolin/paper-key" target="_blank">
        <span class="btn-icon">⭐</span>GitHub 点星
      </a>
    </div>

    <p class="support-foot">
      不赞助也完全没关系。<br>
      你打开这个页面，多敲了几个字，就够了。
    </p>
  </section>

  <!-- 微信收款码弹窗 -->
  <div class="qr-modal" id="qrModal" hidden>
    <div class="qr-mask"></div>
    <div class="qr-card">
      <button class="qr-close" id="qrClose">×</button>
      <img src="assets/wechat-pay.png" alt="01fish 微信收款码">
      <p class="qr-hint">长按识别 · 或微信扫一扫</p>
    </div>
  </div>

  <footer>
    <p>v0.2 · Web Preview · <a href="https://01fish.com">01fish</a> 出品 · Mac 版本即将到来</p>
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
